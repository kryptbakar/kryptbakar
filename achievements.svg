<svg width="100%" viewBox="0 0 1000 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Achievements unlocked">
  <defs>
    <style>
      .ttl  { fill:#8b949e; font:12px ui-monospace,'SF Mono','Courier New',monospace; letter-spacing:2px; }
      .ct   { fill:#e6edf3; font:600 13.5px 'Segoe UI',system-ui,-apple-system,sans-serif; }
      .cs   { fill:#768390; font:400 11px ui-monospace,'SF Mono','Courier New',monospace; letter-spacing:0.5px; }
    </style>
  </defs>

  <rect x="0.75" y="0.75" width="998.5" height="208.5" rx="14" fill="#0d1117" stroke="#30363d" stroke-width="1.5"/>
  <text x="30" y="34" class="ttl">// achievements unlocked</text>

  <g>
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.2s" fill="freeze"/>

    <!-- row 1 -->
    <!-- chip 1 -->
    <g transform="translate(30,58)">
      <rect width="300" height="58" rx="10" fill="#0c111a" stroke="#21262d"/>
      <rect width="4" height="58" rx="2" fill="#58a6ff"/>
      <circle cx="34" cy="29" r="13" fill="none" stroke="#58a6ff" stroke-width="2"/>
      <path d="M34 22 l2.2 4.5 5 0.7 -3.6 3.5 0.9 5 -4.5 -2.4 -4.5 2.4 0.9 -5 -3.6 -3.5 5 -0.7 Z" fill="#58a6ff"/>
      <text x="60" y="26" class="ct">Dean's Honor List</text>
      <text x="60" y="43" class="cs">5th &amp; 6th semester</text>
    </g>
    <!-- chip 2 -->
    <g transform="translate(350,58)">
      <rect width="300" height="58" rx="10" fill="#0c111a" stroke="#21262d"/>
      <rect width="4" height="58" rx="2" fill="#56d4dd"/>
      <circle cx="34" cy="29" r="13" fill="none" stroke="#56d4dd" stroke-width="2"/>
      <path d="M28 29 l4 4 8 -9" fill="none" stroke="#56d4dd" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="60" y="26" class="ct">Google Cybersecurity</text>
      <text x="60" y="43" class="cs">professional certificate</text>
    </g>
    <!-- chip 3 -->
    <g transform="translate(670,58)">
      <rect width="300" height="58" rx="10" fill="#0c111a" stroke="#21262d"/>
      <rect width="4" height="58" rx="2" fill="#3fb950"/>
      <path d="M34 17 l11 4 v9 c0 7 -5 12 -11 15 c-6 -3 -11 -8 -11 -15 v-9 Z" fill="none" stroke="#3fb950" stroke-width="2" stroke-linejoin="round"/>
      <text x="60" y="26" class="ct">2&#215; Security Intern</text>
      <text x="60" y="43" class="cs">Thingtrax &#183; Lahore</text>
    </g>

    <!-- row 2 -->
    <!-- chip 4 -->
    <g transform="translate(30,128)">
      <rect width="300" height="58" rx="10" fill="#0c111a" stroke="#21262d"/>
      <rect width="4" height="58" rx="2" fill="#56d4dd"/>
      <g transform="translate(34,29)" stroke="#56d4dd" fill="none" stroke-width="1.8">
        <path d="M-9 6 a9 9 0 0 1 9 -9" stroke-linecap="round"/>
        <path d="M-5 6 a5 5 0 0 1 5 -5" stroke-linecap="round"/>
        <circle cx="0" cy="6" r="1.6" fill="#56d4dd" stroke="none"/>
      </g>
      <text x="60" y="26" class="ct">PHY-Layer Research</text>
      <text x="60" y="43" class="cs">+0.299 bits/s/Hz secrecy gain</text>
    </g>
    <!-- chip 5 -->
    <g transform="translate(350,128)">
      <rect width="300" height="58" rx="10" fill="#0c111a" stroke="#21262d"/>
      <rect width="4" height="58" rx="2" fill="#58a6ff"/>
      <g transform="translate(34,29)" stroke="#58a6ff" fill="none" stroke-width="1.8">
        <circle cx="0" cy="0" r="5"/>
        <path d="M0 -11 v3 M0 8 v3 M-11 0 h3 M8 0 h3 M-8 -8 l2 2 M6 6 l2 2 M-8 8 l2 -2 M6 -6 l2 -2" stroke-linecap="round"/>
      </g>
      <text x="60" y="26" class="ct">DevSecOps Pipeline</text>
      <text x="60" y="43" class="cs">SAST + SCA fail-fast gates</text>
    </g>
    <!-- chip 6 -->
    <g transform="translate(670,128)">
      <rect width="300" height="58" rx="10" fill="#0c111a" stroke="#21262d"/>
      <rect width="4" height="58" rx="2" fill="#3fb950"/>
      <g transform="translate(34,29)" stroke="#3fb950" fill="none" stroke-width="1.8">
        <rect x="-8" y="-3" width="16" height="12" rx="2"/>
        <path d="M-4 -3 v-3 a4 4 0 0 1 8 0 v3" stroke-linecap="round"/>
      </g>
      <text x="60" y="26" class="ct">5 Security Projects</text>
      <text x="60" y="43" class="cs">AppSec &#183; ML-Sec &#183; privacy</text>
    </g>
  </g>
</svg>
