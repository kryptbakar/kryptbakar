<svg width="100%" viewBox="0 0 520 470" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="rfill" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.55">
        <animate attributeName="stop-color" values="#ff2d95;#b026ff;#00f0ff;#ff2d95" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.10">
        <animate attributeName="stop-color" values="#00f0ff;#ff2d95;#b026ff;#00f0ff" dur="7s" repeatCount="indefinite"/>
      </stop>
    </radialGradient>
    <linearGradient id="rstroke" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#b026ff"/>
    </linearGradient>
    <filter id="g2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .lbl { fill:#ecdcff; font:600 13px 'Segoe UI',system-ui,sans-serif; }
      .pct { fill:#39ff14; font:11px 'Courier New',monospace; }
      .ttl { fill:#9a7bd0; font:12px 'Courier New',monospace; letter-spacing:2px; }
    </style>
  </defs>

  <text x="20" y="28" class="ttl">// arsenal.radar &#8212; offensive &#215; defensive</text>

  <g transform="translate(260,212)">
    <g fill="none" stroke="#7af9ff" stroke-opacity="0.20" stroke-width="1">
      <polygon points="0,-150 129.9,-75 129.9,75 0,150 -129.9,75 -129.9,-75"/>
      <polygon points="0,-112.5 97.4,-56.25 97.4,56.25 0,112.5 -97.4,56.25 -97.4,-56.25"/>
      <polygon points="0,-75 64.95,-37.5 64.95,37.5 0,75 -64.95,37.5 -64.95,-37.5"/>
      <polygon points="0,-37.5 32.48,-18.75 32.48,18.75 0,37.5 -32.48,18.75 -32.48,-18.75"/>
    </g>
    <g stroke="#ff2d95" stroke-opacity="0.18" stroke-width="0.8">
      <line x1="0" y1="0" x2="0" y2="-150"/>
      <line x1="0" y1="0" x2="129.9" y2="-75"/>
      <line x1="0" y1="0" x2="129.9" y2="75"/>
      <line x1="0" y1="0" x2="0" y2="150"/>
      <line x1="0" y1="0" x2="-129.9" y2="75"/>
      <line x1="0" y1="0" x2="-129.9" y2="-75"/>
    </g>

    <g>
      <animateTransform attributeName="transform" type="scale" from="0" to="1" dur="1.4s" calcMode="spline" keySplines="0.2 0.8 0.2 1" fill="freeze"/>
      <polygon points="0,-142.5 110.4,-63.75 116.9,67.5 0,105 -103.9,60 -114.3,-66"
               fill="url(#rfill)" stroke="url(#rstroke)" stroke-width="3" filter="url(#g2)">
        <animate attributeName="fill-opacity" values="1;0.7;1" dur="3.5s" begin="1.4s" repeatCount="indefinite"/>
      </polygon>
      <circle cx="0" cy="-142.5" r="4.5" fill="#00f0ff" filter="url(#g2)"/>
      <circle cx="110.4" cy="-63.75" r="4.5" fill="#39ff14" filter="url(#g2)"/>
      <circle cx="116.9" cy="67.5" r="4.5" fill="#ff2d95" filter="url(#g2)"/>
      <circle cx="0" cy="105" r="4.5" fill="#b026ff" filter="url(#g2)"/>
      <circle cx="-103.9" cy="60" r="4.5" fill="#00f0ff" filter="url(#g2)"/>
      <circle cx="-114.3" cy="-66" r="4.5" fill="#ff2d95" filter="url(#g2)"/>
    </g>

    <text x="0"    y="-168" class="lbl" text-anchor="middle">App Security</text>
    <text x="0"    y="-153" class="pct" text-anchor="middle">95%</text>
    <text x="142"  y="-74"  class="lbl" text-anchor="start">DevSecOps</text>
    <text x="142"  y="-59"  class="pct" text-anchor="start">85%</text>
    <text x="142"  y="80"   class="lbl" text-anchor="start">Wireless / PHY</text>
    <text x="142"  y="95"   class="pct" text-anchor="start">90%</text>
    <text x="0"    y="182"  class="lbl" text-anchor="middle">ML-Security</text>
    <text x="0"    y="197"  class="pct" text-anchor="middle">70%</text>
    <text x="-142" y="80"   class="lbl" text-anchor="end">Offensive</text>
    <text x="-142" y="95"   class="pct" text-anchor="end">80%</text>
    <text x="-142" y="-74"  class="lbl" text-anchor="end">Secure Dev</text>
    <text x="-142" y="-59"  class="pct" text-anchor="end">88%</text>
  </g>
</svg>
