<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 300" width="860" height="300" font-family="'JetBrains Mono','Fira Code',ui-monospace,Consolas,monospace" role="img" aria-label="DQN artificial-noise allocation: +0.299 bits/s/Hz secrecy gain">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#091410"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#27ae60" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#27ae60" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1e8f4e"/><stop offset="1" stop-color="#7dffaf"/>
    </linearGradient>
    <linearGradient id="gtext" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aaffd0"/><stop offset="1" stop-color="#27ae60"/>
    </linearGradient>
    <pattern id="pscan" width="4" height="4" patternUnits="userSpaceOnUse"><rect width="4" height="1.3" fill="#000" fill-opacity="0.18"/></pattern>
    <filter id="g2" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="2.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <style>
      .draw{stroke-dasharray:1200;stroke-dashoffset:1200;animation:draw 2.6s ease-out 0.4s forwards;}
      .areaIn{opacity:0;animation:fade 1.4s ease-out 1.6s forwards;}
      .pop{opacity:0;transform:scale(.7);transform-origin:center;animation:pop .6s cubic-bezier(.2,1.4,.4,1) 2.7s forwards;}
      .dotmv{animation:dot 2.6s ease-out 0.4s forwards;}
      .barA{transform:scaleY(0);transform-origin:bottom;animation:gA .9s ease-out 0.6s forwards;}
      .barB{transform:scaleY(0);transform-origin:bottom;animation:gB 1.1s cubic-bezier(.2,.9,.3,1) 1.1s forwards;}
      .blip{animation:blip 1.6s ease-in-out 3s infinite;}
      @keyframes draw{to{stroke-dashoffset:0}}
      @keyframes fade{to{opacity:1}}
      @keyframes pop{to{opacity:1;transform:scale(1)}}
      @keyframes gA{to{transform:scaleY(1)}}
      @keyframes gB{to{transform:scaleY(1)}}
      @keyframes blip{0%,100%{filter:drop-shadow(0 0 3px #27ae60)}50%{filter:drop-shadow(0 0 10px #27ae60)}}
      @keyframes dot{from{offset-distance:0%}to{offset-distance:100%}}
    </style>
  </defs>

  <rect width="860" height="300" rx="14" fill="url(#pbg)"/>
  <rect x="0.75" y="0.75" width="858.5" height="298.5" rx="13" fill="none" stroke="#27ae60" stroke-opacity="0.35" stroke-width="1.5"/>

  <!-- header -->
  <text x="28" y="40" font-size="17" font-weight="700" fill="#e6f6ec" letter-spacing="1">DQN ARTIFICIAL-NOISE ALLOCATION</text>
  <text x="28" y="60" font-size="12" fill="#5e8a72">MISO wiretap channel · Rayleigh fading · imperfect CSI</text>
  <circle class="blip" cx="832" cy="34" r="5" fill="#27c93f"/>
  <text x="820" y="38" text-anchor="end" font-size="11" fill="#5e8a72">LIVE</text>

  <!-- ===== convergence plot ===== -->
  <g>
    <!-- axes -->
    <line x1="70" y1="90" x2="70" y2="240" stroke="#27ae60" stroke-opacity="0.4"/>
    <line x1="70" y1="240" x2="470" y2="240" stroke="#27ae60" stroke-opacity="0.4"/>
    <!-- gridlines -->
    <g stroke="#27ae60" stroke-opacity="0.1">
      <line x1="70" y1="200" x2="470" y2="200"/><line x1="70" y1="160" x2="470" y2="160"/><line x1="70" y1="120" x2="470" y2="120"/>
    </g>
    <text x="62" y="244" text-anchor="end" font-size="10" fill="#5e8a72">0</text>
    <text x="62" y="124" text-anchor="end" font-size="10" fill="#5e8a72">+.3</text>
    <text transform="translate(24,165) rotate(-90)" font-size="10.5" fill="#7fb595" text-anchor="middle">secrecy gain (b/s/Hz)</text>
    <text x="270" y="262" text-anchor="middle" font-size="10.5" fill="#7fb595">training episodes →</text>

    <!-- area under curve -->
    <path class="areaIn" d="M70 238 C150 232 200 205 250 175 C300 148 340 130 470 122 L470 240 L70 240 Z" fill="url(#area)"/>
    <!-- the convergence curve (self-drawing) -->
    <path id="conv" class="draw" d="M70 238 C150 232 200 205 250 175 C300 148 340 130 470 122" fill="none" stroke="url(#line)" stroke-width="3" stroke-linecap="round" filter="url(#g2)"/>
    <!-- moving head dot -->
    <circle class="dotmv" r="4.5" fill="#aaffd0" style="offset-path:path('M70 238 C150 232 200 205 250 175 C300 148 340 130 470 122')"><animate attributeName="opacity" values="1;1;0" keyTimes="0;0.9;1" dur="3s" begin="0.4s" fill="freeze"/></circle>
  </g>

  <!-- ===== right: gain readout + comparison ===== -->
  <g>
    <!-- divider + card -->
    <line x1="516" y1="84" x2="516" y2="250" stroke="#27ae60" stroke-opacity="0.18"/>
    <rect x="540" y="74" width="296" height="158" rx="10" fill="#27ae60" fill-opacity="0.05" stroke="#27ae60" stroke-opacity="0.22"/>
    <!-- big gain number -->
    <g class="pop">
      <text x="688" y="130" text-anchor="middle" font-size="44" font-weight="800" fill="url(#gtext)" filter="url(#g2)">+0.299</text>
      <text x="688" y="152" text-anchor="middle" font-size="12" fill="#7fb595" letter-spacing="1">bits / s / Hz secrecy gain</text>
    </g>
    <!-- horizontal comparison bars -->
    <g font-size="10.5">
      <text x="558" y="184" fill="#7fb595">Fixed</text>
      <rect x="600" y="174" height="11" rx="5.5" fill="#2c5440">
        <animate attributeName="width" from="0" to="120" dur="0.9s" begin="0.7s" fill="freeze"/></rect>
      <text x="558" y="210" fill="#aaffd0">DQN</text>
      <rect x="600" y="200" height="11" rx="5.5" fill="url(#line)" filter="url(#g2)">
        <animate attributeName="width" from="0" to="196" dur="1.1s" begin="1.2s" fill="freeze"/></rect>
      <!-- gain marker between bar ends -->
      <g class="pop">
        <line x1="720" y1="170" x2="720" y2="216" stroke="#7dffaf" stroke-dasharray="3 3" stroke-opacity="0.5"/>
        <line x1="796" y1="200" x2="796" y2="216" stroke="#7dffaf" stroke-opacity="0.6"/>
        <text x="758" y="230" text-anchor="middle" font-size="10" fill="#7dffaf">Δ secrecy ▸</text>
      </g>
    </g>
  </g>

  <rect width="860" height="300" rx="14" fill="url(#pscan)" pointer-events="none"/>
</svg>
