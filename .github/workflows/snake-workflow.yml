# ───────────────────────────────────────────────────────────────────────────
#  Generates the "snake eating your contributions" graph — neon synthwave.
#  SETUP:
#   1. Save this file at:  .github/workflows/snake.yml   in your kryptbakar repo
#   2. Repo Settings → Actions → General → Workflow permissions
#        → enable "Read and write permissions"  → Save
#   3. Actions tab → "Generate Snake" → Run workflow  (first run is manual)
#   4. It pushes snake.svg to the  output  branch; the README already points there.
#   It then auto-refreshes every 12 hours.
# ───────────────────────────────────────────────────────────────────────────
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Build snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#ff2d95&color_dots=#0c0220,#3a1d63,#7a3aa0,#b026ff,#00f0ff
            dist/snake-dark.svg?palette=github-dark&color_snake=#ff2d95&color_dots=#0c0220,#3a1d63,#7a3aa0,#b026ff,#00f0ff

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
