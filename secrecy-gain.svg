<svg width="100%" viewBox="0 0 760 360" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="optfill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </linearGradient>
    <filter id="g3" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <style>
      .ttl  { fill:#eaf2ff; font-size:16px; font-weight:700; font-family:'Segoe UI',system-ui,sans-serif; }
      .sub  { fill:#7c8aa5; font-size:11px; }
      .axl  { fill:#9fb3c8; font-size:11px; }
      .leg  { fill:#cdd9e8; font-size:11.5px; }
      .big  { fill:#2ecc71; font-size:30px; font-weight:800; font-family:'Segoe UI',system-ui,sans-serif; }
      .bigl { fill:#9fb3c8; font-size:11px; letter-spacing:1px; }
    </style>
  </defs>

  <rect x="6" y="6" width="748" height="348" rx="14" fill="#0d1117" stroke="#1e2a3a" stroke-width="1"/>

  <text x="28" y="40" class="ttl">Physical-Layer Secrecy Optimization</text>
  <text x="28" y="58" class="sub">secrecy rate vs. transmit SNR &#8212; adaptive vs. fixed power / subcarrier allocation</text>

  <!-- gridlines -->
  <g stroke="#1e2a3a" stroke-width="1">
    <line x1="70" y1="216.7" x2="700" y2="216.7"/>
    <line x1="70" y1="143.3" x2="700" y2="143.3"/>
  </g>

  <!-- axes -->
  <g stroke="#3a4a5e" stroke-width="1.5">
    <line x1="70" y1="290" x2="700" y2="290"/>
    <line x1="70" y1="70"  x2="70"  y2="290"/>
  </g>

  <!-- axis ticks + labels -->
  <g class="axl" text-anchor="middle">
    <text x="70"  y="306">0</text>
    <text x="280" y="306">10</text>
    <text x="490" y="306">20</text>
    <text x="700" y="306">30</text>
  </g>
  <g class="axl" text-anchor="end">
    <text x="62" y="294">0</text>
    <text x="62" y="220">2</text>
    <text x="62" y="147">4</text>
  </g>
  <text x="385" y="330" class="axl" text-anchor="middle">Transmit SNR (dB)</text>
  <text x="22" y="180" class="axl" text-anchor="middle" transform="rotate(-90 22 180)">Secrecy Rate (bits/s/Hz)</text>

  <!-- area under optimized curve -->
  <path d="M70,279 C122.5,279 122.5,244.2 175,244.2 C227.5,244.2 227.5,209.3 280,209.3 C332.5,209.3 332.5,183.7 385,183.7 C437.5,183.7 437.5,165.3 490,165.3 C542.5,165.3 542.5,152.9 595,152.9 C647.5,152.9 647.5,146.3 700,146.3 L700,290 L70,290 Z"
        fill="url(#optfill)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.8s" begin="1.6s" fill="freeze"/>
  </path>

  <!-- fixed allocation curve (dashed indigo) -->
  <path d="M70,284.5 C122.5,284.5 122.5,255.2 175,255.2 C227.5,255.2 227.5,222.2 280,222.2 C332.5,222.2 332.5,196.5 385,196.5 C437.5,196.5 437.5,176.3 490,176.3 C542.5,176.3 542.5,163.5 595,163.5 C647.5,163.5 647.5,157.3 700,157.3"
        fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.6s" fill="freeze"/>
    <set attributeName="stroke-dasharray" to="6 5" begin="1.6s" fill="freeze"/>
  </path>

  <!-- optimized curve (solid green) -->
  <path d="M70,279 C122.5,279 122.5,244.2 175,244.2 C227.5,244.2 227.5,209.3 280,209.3 C332.5,209.3 332.5,183.7 385,183.7 C437.5,183.7 437.5,165.3 490,165.3 C542.5,165.3 542.5,152.9 595,152.9 C647.5,152.9 647.5,146.3 700,146.3"
        fill="none" stroke="#2ecc71" stroke-width="3" stroke-linecap="round" filter="url(#g3)" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="1.6s" begin="0.25s" fill="freeze"/>
  </path>

  <!-- delta marker at SNR = 20 -->
  <g opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.1s" fill="freeze"/>
    <line x1="490" y1="176.3" x2="490" y2="165.3" stroke="#ec4899" stroke-width="2.5"/>
    <polygon points="490,164 486,170 494,170" fill="#ec4899"/>
    <polygon points="490,177.6 486,171.6 494,171.6" fill="#ec4899"/>
    <circle cx="490" cy="176.3" r="3.5" fill="#6366f1"/>
    <circle cx="490" cy="165.3" r="3.5" fill="#2ecc71"/>
    <line x1="490" y1="170.8" x2="540" y2="120" stroke="#ec4899" stroke-width="1" stroke-dasharray="3 3"/>
  </g>

  <!-- big gain callout -->
  <g transform="translate(545,108)" opacity="0">
    <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.35s" fill="freeze"/>
    <animateTransform attributeName="transform" type="translate" values="545,118;545,108" dur="0.6s" begin="2.35s" fill="freeze"/>
    <text x="0" y="0" class="big" filter="url(#g3)">+0.299</text>
    <text x="2" y="16" class="bigl">bits/s/Hz secrecy gain</text>
  </g>

  <!-- legend -->
  <g transform="translate(95,92)">
    <line x1="0" y1="0" x2="22" y2="0" stroke="#2ecc71" stroke-width="3"/>
    <text x="28" y="4" class="leg">Adaptive (optimized)</text>
    <line x1="0" y1="18" x2="22" y2="18" stroke="#6366f1" stroke-width="2.5" stroke-dasharray="6 5"/>
    <text x="28" y="22" class="leg">Fixed allocation</text>
  </g>
</svg>
