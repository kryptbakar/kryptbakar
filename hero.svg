<svg width="100%" viewBox="0 0 1000 320" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e16"/>
      <stop offset="55%" stop-color="#0b1120"/>
      <stop offset="100%" stop-color="#0a0f1c"/>
    </linearGradient>
    <radialGradient id="orb1" cx="30%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0a0e16" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orb2" cx="70%" cy="70%" r="55%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#0a0e16" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="uline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2ecc71"/>
      <stop offset="55%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <radialGradient id="sweep" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .hex   { fill:#2ecc71; opacity:0.10; font-size:13px; }
      .nm    { fill:#eaf2ff; font-size:48px; font-weight:700; letter-spacing:-1px;
               font-family:'Segoe UI',system-ui,-apple-system,sans-serif; }
      .sub   { fill:#2ecc71; font-size:14px; letter-spacing:2.5px; }
      .stat  { fill:#9fb3c8; font-size:13px; }
      .hud   { fill:#5b6b82; font-size:11px; letter-spacing:1.5px; }
      .tag   { fill:#7c8aa5; font-size:11px; letter-spacing:1px; }
    </style>
  </defs>

  <!-- backdrop -->
  <rect width="1000" height="320" fill="url(#bg)"/>
  <rect width="1000" height="320" fill="url(#orb1)"/>
  <rect width="1000" height="320" fill="url(#orb2)"/>

  <!-- faint console grid -->
  <g stroke="#7c8aa5" stroke-width="0.5" opacity="0.06">
    <line x1="0" y1="64" x2="1000" y2="64"/>
    <line x1="0" y1="128" x2="1000" y2="128"/>
    <line x1="0" y1="192" x2="1000" y2="192"/>
    <line x1="0" y1="256" x2="1000" y2="256"/>
    <line x1="200" y1="0" x2="200" y2="320"/>
    <line x1="400" y1="0" x2="400" y2="320"/>
    <line x1="600" y1="0" x2="600" y2="320"/>
    <line x1="800" y1="0" x2="800" y2="320"/>
  </g>

  <!-- falling hex/binary rain (subtle) -->
  <g class="hex">
    <text x="120" y="0">10110<tspan x="120" dy="16">01001</tspan><tspan x="120" dy="16">11010</tspan><tspan x="120" dy="16">00111</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-70;0,330" dur="7s" repeatCount="indefinite"/>
    </text>
    <text x="300" y="0">7F<tspan x="300" dy="16">A2</tspan><tspan x="300" dy="16">0x</tspan><tspan x="300" dy="16">E9</tspan><tspan x="300" dy="16">1C</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-90;0,330" dur="9s" repeatCount="indefinite"/>
    </text>
    <text x="470" y="0">01<tspan x="470" dy="16">11</tspan><tspan x="470" dy="16">00</tspan><tspan x="470" dy="16">10</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-60;0,330" dur="6s" repeatCount="indefinite"/>
    </text>
    <text x="640" y="0">SYN<tspan x="640" dy="16">ACK</tspan><tspan x="640" dy="16">FIN</tspan><tspan x="640" dy="16">RST</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-80;0,330" dur="10s" repeatCount="indefinite"/>
    </text>
    <text x="940" y="0">00<tspan x="940" dy="16">FF</tspan><tspan x="940" dy="16">1A</tspan><tspan x="940" dy="16">3D</tspan>
      <animateTransform attributeName="transform" type="translate" values="0,-100;0,330" dur="8s" repeatCount="indefinite"/>
    </text>
  </g>

  <!-- HUD corner brackets -->
  <g stroke="#2ecc71" stroke-width="1.4" opacity="0.55" fill="none">
    <path d="M16 16 h26 M16 16 v22"/>
    <path d="M984 16 h-26 M984 16 v22"/>
    <path d="M16 304 h26 M16 304 v-22"/>
    <path d="M984 304 h-26 M984 304 v-22"/>
  </g>

  <!-- HUD labels -->
  <g>
    <circle cx="30" cy="38" r="4" fill="#2ecc71">
      <animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/>
    </circle>
    <text x="42" y="42" class="hud">LIVE</text>
    <text x="968" y="42" class="hud" text-anchor="end">SYS://giki.sec/node-07</text>
  </g>

  <!-- ===== RADAR CONSOLE ===== -->
  <g transform="translate(818,165)">
    <circle r="92" fill="#0d1424" stroke="#1e3a2e" stroke-width="1"/>
    <circle r="92" fill="none" stroke="#2ecc71" stroke-width="1" opacity="0.30"/>
    <circle r="62" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.20"/>
    <circle r="32" fill="none" stroke="#2ecc71" stroke-width="0.8" opacity="0.20"/>
    <line x1="-92" y1="0" x2="92" y2="0" stroke="#2ecc71" stroke-width="0.6" opacity="0.18"/>
    <line x1="0" y1="-92" x2="0" y2="92" stroke="#2ecc71" stroke-width="0.6" opacity="0.18"/>

    <!-- rotating sweep -->
    <g>
      <path d="M0 0 L92 0 A92 92 0 0 0 65 -65 Z" fill="url(#sweep)"/>
      <line x1="0" y1="0" x2="92" y2="0" stroke="#2ecc71" stroke-width="2"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>

    <!-- detected blips -->
    <circle cx="-38" cy="-30" r="3.5" fill="#ec4899">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.4;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="44" cy="22" r="3.5" fill="#fbbf24">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.75;0.85" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="18" cy="-50" r="3" fill="#2ecc71">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.8;0.95;1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="818" y="285" class="tag" text-anchor="middle">// attack-surface scan</text>

  <!-- ===== IDENTITY BLOCK ===== -->
  <text x="60" y="118" class="sub">┌─[ kryptbakar㉿giki ]──[~]</text>
  <text x="60" y="168" class="nm" filter="url(#glow)">Muhammad Abubakar</text>

  <!-- animated underline -->
  <rect x="62" y="184" width="430" height="3" rx="1.5" fill="url(#uline)">
    <animate attributeName="width" values="0;430" dur="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="0.6;1;0.6" dur="3.5s" begin="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="62" y="212" class="stat">CYBER-SECURITY RESEARCHER &#183; APPSEC ENGINEER &#183; GIKI &#39;27</text>

  <!-- cycling status line -->
  <text x="62" y="244" class="sub" opacity="0">
    &gt; scanning attack surface ...
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.34;1" dur="7.5s" begin="0s" repeatCount="indefinite"/>
  </text>
  <text x="62" y="244" class="sub" opacity="0">
    &gt; modeling threat vectors ...
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.34;1" dur="7.5s" begin="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="62" y="244" fill="#2ecc71" font-size="14" letter-spacing="2.5" opacity="0">
    &gt; vulnerability patched &#183; system secure &#10003;
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.34;1" dur="7.5s" begin="5s" repeatCount="indefinite"/>
  </text>

  <!-- blinking cursor -->
  <rect x="62" y="262" width="11" height="3" fill="#2ecc71">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- vertical CRT scanline -->
  <rect x="0" y="0" width="1000" height="2" fill="#2ecc71" opacity="0.05">
    <animate attributeName="y" values="-2;320" dur="5.5s" repeatCount="indefinite"/>
  </rect>
</svg>
