<svg width="100%" viewBox="0 0 1000 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Muhammad Abubakar — Cyber Security Researcher · AppSec Engineer · GIKI '27">
  <defs>
    <!-- background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#0d1117"/>
      <stop offset="60%"  stop-color="#0e1420"/>
      <stop offset="100%" stop-color="#0a0f17"/>
    </linearGradient>

    <!-- subtle top sheen -->
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1f6feb" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1f6feb" stop-opacity="0"/>
    </linearGradient>

    <!-- name gradient: restrained blue -> teal -->
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e6edf3"/>
      <stop offset="60%"  stop-color="#9ecbff"/>
      <stop offset="100%" stop-color="#56d4dd"/>
    </linearGradient>

    <linearGradient id="rule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#56d4dd" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="sweep" cx="0%" cy="50%" r="100%">
      <stop offset="0%"   stop-color="#58a6ff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"/>
    </radialGradient>

    <style>
      .nm   { font:600 46px 'Segoe UI',system-ui,-apple-system,sans-serif; letter-spacing:-0.5px; }
      .sub  { fill:#8b949e; font:500 14px ui-monospace,'SF Mono','Courier New',monospace; letter-spacing:2px; }
      .lead { fill:#56d4dd; font:500 13px ui-monospace,'SF Mono','Courier New',monospace; letter-spacing:1.5px; }
      .hud  { fill:#6e7681; font:400 11px ui-monospace,'SF Mono','Courier New',monospace; letter-spacing:1.5px; }
      .stat { fill:#768390; font:400 13px ui-monospace,'SF Mono','Courier New',monospace; letter-spacing:1px; }
    </style>
  </defs>

  <!-- panel -->
  <rect width="1000" height="300" rx="14" fill="url(#bg)"/>
  <rect width="1000" height="300" rx="14" fill="url(#sheen)"/>
  <rect x="0.75" y="0.75" width="998.5" height="298.5" rx="13.25" fill="none" stroke="#30363d" stroke-width="1.5"/>

  <!-- top status row -->
  <circle cx="34" cy="34" r="4" fill="#3fb950">
    <animate attributeName="opacity" values="1;0.35;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="48" y="38" class="hud" fill="#3fb950">AVAILABLE FOR SECURITY ROLES</text>
  <text x="966" y="38" class="hud" text-anchor="end">GIKI · PAKISTAN</text>

  <!-- ===== radar (subtle, right) ===== -->
  <g transform="translate(838,160)" opacity="0.9">
    <circle r="82" fill="#0c111a" stroke="#30363d" stroke-width="1"/>
    <circle r="55" fill="none" stroke="#21262d" stroke-width="1"/>
    <circle r="28" fill="none" stroke="#21262d" stroke-width="1"/>
    <line x1="-82" y1="0" x2="82" y2="0" stroke="#21262d" stroke-width="1"/>
    <line x1="0" y1="-82" x2="0" y2="82" stroke="#21262d" stroke-width="1"/>
    <g>
      <path d="M0 0 L82 0 A82 82 0 0 0 58 -58 Z" fill="url(#sweep)"/>
      <line x1="0" y1="0" x2="82" y2="0" stroke="#58a6ff" stroke-width="1.5" stroke-opacity="0.65"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </g>
    <circle cx="-30" cy="-24" r="3" fill="#56d4dd">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.4;0.6" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="38" cy="18" r="3" fill="#58a6ff">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.75;0.85" dur="8s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="838" y="272" class="hud" text-anchor="middle">attack-surface monitor</text>

  <!-- ===== identity ===== -->
  <text x="60" y="104" class="lead">kryptbakar@giki:~$</text>

  <text x="60" y="158" class="nm" fill="url(#name)">Muhammad Abubakar</text>

  <rect x="62" y="176" width="0" height="2.5" rx="1.25" fill="url(#rule)">
    <animate attributeName="width" values="0;430" dur="1s" fill="freeze" calcMode="spline" keySplines="0.22 1 0.36 1"/>
  </rect>

  <text x="62" y="206" class="sub">CYBER-SECURITY RESEARCHER &#183; APPSEC ENGINEER &#183; GIKI &#39;27</text>

  <!-- one calm status line with a blinking cursor -->
  <text x="62" y="240" class="stat">modeling &#183; reproducing &#183; patching vulnerabilities</text>
  <rect x="437" y="230" width="8" height="14" fill="#56d4dd">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
