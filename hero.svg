<svg width="100%" viewBox="0 0 1000 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0118"/>
      <stop offset="50%" stop-color="#11062b"/>
      <stop offset="100%" stop-color="#080014"/>
    </linearGradient>

    <!-- aurora blobs -->
    <radialGradient id="a1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b026ff" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>

    <!-- holographic shimmer for the name -->
    <linearGradient id="holo" x1="0" y1="0" x2="1" y2="0.4">
      <stop offset="0%"   stop-color="#00f0ff">
        <animate attributeName="stop-color" values="#00f0ff;#ff2d95;#b026ff;#39ff14;#00f0ff" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%"  stop-color="#ff2d95">
        <animate attributeName="stop-color" values="#ff2d95;#b026ff;#39ff14;#00f0ff;#ff2d95" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#b026ff">
        <animate attributeName="stop-color" values="#b026ff;#39ff14;#00f0ff;#ff2d95;#b026ff" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="uline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00f0ff"/>
      <stop offset="50%" stop-color="#ff2d95"/>
      <stop offset="100%" stop-color="#b026ff"/>
    </linearGradient>

    <linearGradient id="gridfade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.6"/>
    </linearGradient>

    <radialGradient id="sweep" cx="0%" cy="50%" r="100%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- continuous hue rotation = the "trip" -->
    <filter id="hue">
      <feColorMatrix type="hueRotate" values="0">
        <animate attributeName="values" from="0" to="360" dur="9s" repeatCount="indefinite"/>
      </feColorMatrix>
    </filter>

    <style>
      .nm   { font:700 50px 'Segoe UI',system-ui,-apple-system,sans-serif; letter-spacing:-1px; }
      .sub  { fill:#d8b8ff; font:600 14px 'Courier New',monospace; letter-spacing:2.5px; }
      .lead { fill:#7af9ff; font:600 14px 'Courier New',monospace; letter-spacing:2px; }
      .hud  { fill:#9a7bd0; font:11px 'Courier New',monospace; letter-spacing:1.5px; }
      .tag  { fill:#c98bff; font:11px 'Courier New',monospace; letter-spacing:1px; }
    </style>
  </defs>

  <rect width="1000" height="340" fill="url(#bg)"/>

  <!-- ===== AURORA (hue-cycling) ===== -->
  <g filter="url(#hue)">
    <g filter="url(#bigglow)">
      <circle cx="220" cy="90" r="150" fill="url(#a1)">
        <animate attributeName="cx" values="220;260;220" dur="11s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="90;120;90" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle cx="640" cy="70" r="130" fill="url(#a2)">
        <animate attributeName="cx" values="640;600;640" dur="10s" repeatCount="indefinite"/>
        <animate attributeName="cy" values="70;110;70" dur="13s" repeatCount="indefinite"/>
      </circle>
      <circle cx="480" cy="180" r="140" fill="url(#a3)">
        <animate attributeName="cy" values="180;150;180" dur="12s" repeatCount="indefinite"/>
        <animate attributeName="cx" values="480;520;480" dur="8s" repeatCount="indefinite"/>
      </circle>
    </g>
  </g>

  <!-- ===== SYNTHWAVE GRID ===== -->
  <g opacity="0.9">
    <!-- vertical converging lines -->
    <g stroke="url(#gridfade)" stroke-width="1.2">
      <line x1="500" y1="252" x2="-360" y2="340"/>
      <line x1="500" y1="252" x2="-110" y2="340"/>
      <line x1="500" y1="252" x2="120"  y2="340"/>
      <line x1="500" y1="252" x2="300"  y2="340"/>
      <line x1="500" y1="252" x2="430"  y2="340"/>
      <line x1="500" y1="252" x2="500"  y2="340"/>
      <line x1="500" y1="252" x2="570"  y2="340"/>
      <line x1="500" y1="252" x2="700"  y2="340"/>
      <line x1="500" y1="252" x2="880"  y2="340"/>
      <line x1="500" y1="252" x2="1110" y2="340"/>
      <line x1="500" y1="252" x2="1360" y2="340"/>
    </g>
    <!-- horizontal perspective lines -->
    <g stroke="#00f0ff" stroke-width="1" opacity="0.45">
      <line x1="0" y1="262" x2="1000" y2="262" opacity="0.30"/>
      <line x1="0" y1="276" x2="1000" y2="276" opacity="0.45"/>
      <line x1="0" y1="294" x2="1000" y2="294" opacity="0.60"/>
      <line x1="0" y1="316" x2="1000" y2="316" opacity="0.80"/>
      <line x1="0" y1="340" x2="1000" y2="340"/>
    </g>
    <!-- scrolling glow line -->
    <line x1="0" x2="1000" stroke="#ff2d95" stroke-width="2" opacity="0.8" y1="262" y2="262">
      <animate attributeName="y1" values="258;340" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="y2" values="258;340" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0" dur="3.5s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- HUD brackets -->
  <g stroke="#00f0ff" stroke-width="1.4" opacity="0.7" fill="none">
    <path d="M16 16 h26 M16 16 v22"/>
    <path d="M984 16 h-26 M984 16 v22"/>
  </g>
  <circle cx="30" cy="38" r="4" fill="#39ff14">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.3s" repeatCount="indefinite"/>
  </circle>
  <text x="42" y="42" class="hud">LIVE</text>
  <text x="968" y="42" class="hud" text-anchor="end">SYS://giki.sec/node-07</text>

  <!-- ===== RADAR ===== -->
  <g transform="translate(830,178)">
    <circle r="86" fill="#160630" fill-opacity="0.6" stroke="#00f0ff" stroke-width="1" stroke-opacity="0.4"/>
    <circle r="58" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.25"/>
    <circle r="30" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.25"/>
    <line x1="-86" y1="0" x2="86" y2="0" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.2"/>
    <line x1="0" y1="-86" x2="0" y2="86" stroke="#00f0ff" stroke-width="0.6" stroke-opacity="0.2"/>
    <g>
      <path d="M0 0 L86 0 A86 86 0 0 0 61 -61 Z" fill="url(#sweep)"/>
      <line x1="0" y1="0" x2="86" y2="0" stroke="#ff2d95" stroke-width="2" filter="url(#glow)"/>
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
    </g>
    <circle cx="-34" cy="-28" r="4" fill="#39ff14" filter="url(#glow)">
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.4;0.6" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="40" cy="20" r="4" fill="#00f0ff" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.4;0.5;0.75;0.85" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="16" cy="-46" r="3.5" fill="#b026ff" filter="url(#glow)">
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.7;0.8;0.95;1" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>
  <text x="830" y="292" class="tag" text-anchor="middle">// attack-surface scan</text>

  <!-- ===== IDENTITY ===== -->
  <text x="60" y="116" class="lead">┌─[ kryptbakar㉿giki ]──[~]</text>

  <!-- chromatic glitch copies -->
  <text x="57" y="166" class="nm" fill="#ff2d95" opacity="0.85">Muhammad Abubakar
    <animate attributeName="x" values="57;54;58;55;57" dur="0.45s" repeatCount="indefinite"/>
  </text>
  <text x="63" y="166" class="nm" fill="#00f0ff" opacity="0.85">Muhammad Abubakar
    <animate attributeName="x" values="63;66;62;65;63" dur="0.5s" repeatCount="indefinite"/>
  </text>
  <!-- holographic main fill -->
  <text x="60" y="166" class="nm" fill="url(#holo)" filter="url(#glow)">Muhammad Abubakar</text>

  <rect x="62" y="182" width="430" height="3" rx="1.5" fill="url(#uline)" filter="url(#glow)">
    <animate attributeName="width" values="0;430" dur="1.1s" fill="freeze"/>
    <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" begin="1.1s" repeatCount="indefinite"/>
  </rect>

  <text x="62" y="210" class="sub">CYBER-SECURITY RESEARCHER &#183; APPSEC ENGINEER &#183; GIKI &#39;27</text>

  <!-- cycling status -->
  <text x="62" y="240" class="lead" opacity="0">&gt; scanning attack surface ...
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.34;1" dur="7.5s" begin="0s" repeatCount="indefinite"/>
  </text>
  <text x="62" y="240" fill="#ff7bd5" font-family="'Courier New',monospace" font-size="14" letter-spacing="2" opacity="0">&gt; modeling threat vectors ...
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.34;1" dur="7.5s" begin="2.5s" repeatCount="indefinite"/>
  </text>
  <text x="62" y="240" fill="#39ff14" font-family="'Courier New',monospace" font-size="14" letter-spacing="2" opacity="0">&gt; vulnerability patched &#183; system secure &#10003;
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.04;0.30;0.34;1" dur="7.5s" begin="5s" repeatCount="indefinite"/>
  </text>

  <rect x="62" y="258" width="11" height="3" fill="#39ff14">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>
</svg>
